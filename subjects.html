<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Subjects</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Semester Notes</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="upload.html" class="nav-link">Contribute</a>
      </div>
    </div>
  </nav>

  <header class="header">
    <h1 id="title">Subjects</h1>
    <p id="subtitle">Choose a subject for your semester</p>
  </header>

  <main class="container">
    <a class="back" href="index.html">⬅ Back to semesters</a>
    <div class="searchbar">
      <input id="search" class="search" placeholder="Search subjects..." />

    </div>
    <div class="grid" id="subjectGrid"></div>
  </main>

  <script>
    // COMMON SUBJECTS used across semesters
    const subjects = [
      "Physics", "Chemistry", "Zoology", "Botany", "Mathematics",
      "Computer_Science", "English"
    ];

    // read sem param
    const params = new URLSearchParams(location.search);
    const semRaw = params.get('sem') || '1';
    const semDisplay = semRaw.toLowerCase().startsWith('sem') ? semRaw.replace(/_/g, ' ') : `Semester ${semRaw}`;
    const sem = semRaw; // keep original for links

    document.getElementById('title').innerText = semDisplay;
    document.getElementById('subtitle').innerText = "Choose a subject for " + semDisplay;

    const grid = document.getElementById('subjectGrid');
    function render(filter = '') {
      grid.innerHTML = '';
      subjects.filter(s => s.toLowerCase().includes(filter.toLowerCase())).forEach(s => {
        const a = document.createElement('a');
        a.className = 'card';
        // link to coursetype page with semester & subject
        a.href = `coursetype.html?sem=${encodeURIComponent(sem)}&subject=${encodeURIComponent(s)}`;
        a.innerHTML = `<strong>${s.replace(/_/g, ' ')}</strong><div class="meta">Select course type for ${s.replace(/_/g, ' ')}</div>`;
        grid.appendChild(a);
      });
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value));

    render();
  </script>
</body>

</html>
