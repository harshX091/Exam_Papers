<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Subjects</title>
  <link rel="stylesheet" href="style.css">
  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Semester Notes | Exam Papers & Study Materials">
  <meta property="og:description" content="Access curated exam papers, syllabus, and study materials for every semester. Simplify your studies with our free portal.">
  <meta property="og:image" content="images/social-preview.png">
  <meta property="og:url" content="https://harshx091.github.io/Exam_Papers/">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Semester Notes</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="upload.html" class="nav-link">Contribute</a>
      </div>
    </div>
  </nav>

  <header class="header">
    <h1 id="title">Subjects</h1>
    <p id="subtitle">Choose a subject for your semester</p>
  </header>

  <main class="container">
    <a class="back" href="index.html">⬅ Back to semesters</a>
    <div class="searchbar">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" class="search" placeholder="Search subjects..." />
      </div>
    </div>
    <div class="grid" id="subjectGrid"></div>
  </main>

  <script src="scripts/subjects.js"></script>
  <script>
    // COMMON_SUBJECTS is loaded from scripts/subjects.js
    const subjects = COMMON_SUBJECTS;

    // read sem param
    const params = new URLSearchParams(location.search);
    const semRaw = params.get('sem') || '1';
    const semDisplay = semRaw.toLowerCase().startsWith('sem') ? semRaw.replace(/_/g, ' ') : `Semester ${semRaw}`;
    const sem = semRaw; // keep original for links

    document.getElementById('title').innerText = semDisplay;
    document.getElementById('subtitle').innerText = "Choose a subject for " + semDisplay;

    const grid = document.getElementById('subjectGrid');
    function render(filter = '') {
      grid.innerHTML = '';
      subjects.filter(s => s.toLowerCase().includes(filter.toLowerCase())).forEach(s => {
        const a = document.createElement('a');
        a.className = 'card';
        
        if (typeof GENERAL_SUBJECTS !== 'undefined' && GENERAL_SUBJECTS.includes(s)) {
            // skip coursetype for general subjects, show all sub-subjects together
            a.href = `pdfs.html?sem=${encodeURIComponent(sem)}&subject=${encodeURIComponent(s)}`;
            a.innerHTML = `<strong>${s.replace(/_/g, ' ')}</strong><div class="meta">View materials for ${s.replace(/_/g, ' ')}</div>`;
        } else {
            // link to coursetype page with semester & subject
            a.href = `coursetype.html?sem=${encodeURIComponent(sem)}&subject=${encodeURIComponent(s)}`;
            a.innerHTML = `<strong>${s.replace(/_/g, ' ')}</strong><div class="meta">Select course type for ${s.replace(/_/g, ' ')}</div>`;
        }
        
        grid.appendChild(a);
      });
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value));

    render();
  </script>
</body>

</html>
