name: Regenerate Site Data

# Runs automatically whenever a PR is merged (i.e. a push to main happens)
on:
  push:
    branches:
      - main
    # Only trigger if PDF files or the generator script itself changed
    paths:
      - 'pdfs/**'
      - 'scripts/generateData.js'

jobs:
  generate:
    name: Run generateData.js and commit results
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo (full history so we can push back)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Node.js (matches your local dev environment)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Run the data generation script
      - name: Generate data JSON files
        run: node scripts/generateData.js

      # 4. Commit and push updated data/ files back to main
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes (avoids empty commits)
          git diff --cached --quiet || git commit -m "chore: regenerate data JSONs [skip ci]"
          git push
