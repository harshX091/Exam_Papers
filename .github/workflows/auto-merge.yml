name: Auto-Merge Upload PRs

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        if: startsWith(github.head_ref, 'upload-')
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node.js
        if: startsWith(github.head_ref, 'upload-')
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-merge PR and Regenerate Data
        if: startsWith(github.head_ref, 'upload-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Merge the PR and delete the feature branch.
          # We use --merge to create a merge commit.
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --merge --delete-branch

          # 2. Pull the newly merged changes (the PDF) into the local environment
          git pull origin main

          # 3. Run the data generation script
          node scripts/generateData.js

          # 4. Commit and push the updated data/ JSON files
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          # Only commit/push if there are actual changes
          if git diff --cached --quiet; then
            echo "No data changes detected."
          else
            git commit -m "chore: regenerate site data after merge [skip ci]"
            git push origin main
          fi
