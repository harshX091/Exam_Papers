name: Auto-Merge Upload PRs

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        if: startsWith(github.head_ref, 'upload-')
        uses: actions/checkout@v4

      - name: Auto-merge PR
        # Only auto-merge PRs whose branch starts with 'upload-' (created by the upload script).
        # This prevents auto-merging unrelated manual PRs.
        #
        # NOTE: Data regeneration is intentionally NOT done here.
        # The merge commit below pushes a PDF into pdfs/**, which automatically triggers
        # the separate "Regenerate Site Data" workflow (generate-data.yml).
        # Running generateData.js in both places simultaneously caused a git push race
        # condition where the slower job always failed with a non-fast-forward rejection.
        if: startsWith(github.head_ref, 'upload-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait 10 seconds to ensure GitHub finishes processing the new PR
          sleep 10

          # Merge the PR and delete the feature branch.
          # The resulting push to main (pdfs/** changed) triggers generate-data.yml automatically.
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --merge --delete-branch
